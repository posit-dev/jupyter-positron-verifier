name: Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
  release:
    types: [published]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --group dev pytest

  release-pypi:
    name: "Release to pypi"
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write
    needs: [tests]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - name: "Build Package"
        run: |
          uv build
      - name: "Deploy to PyPI"
        uses: pypa/gh-action-pypi-publish@release/v1
